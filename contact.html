              <center><b>Message</b></center>

              <tr>

                    placeholder="Enter your emai"
                  />
                </td>
              </tr>
              <tr>
                <td><br /></td>
              </tr>

              <tr>
                <td><label for="story">Message:</label></td>
                <td> <textarea id="message" name="data[Message]" rows="4" cols="20"    placeholder="Write your message"> </textarea></td>
              </tr>
            </table>
            <br />
            <center>
              <input type="submit" class="button" value="Contact" />
            </center>
